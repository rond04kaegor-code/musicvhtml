<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ЦКК Music — плейлист MP4</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #fff;
            overflow-x: hidden;
        }

        .bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, #1a2a1a, #030603);
            z-index: -2;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(20px);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(255, 217, 102, 0.4);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .logo-icon {
            font-size: 2rem;
            filter: drop-shadow(0 0 6px #ffd966);
        }

        .logo h1 {
            font-size: 1.6rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ffd966, #ffb347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .stats {
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(8px);
            padding: 0.5rem 1rem;
            border-radius: 40px;
            font-size: 0.85rem;
            color: #ffd966;
        }

        .main-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        .hero {
            text-align: center;
            margin-bottom: 2rem;
        }

        .hero h2 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(120deg, #ffd966, #ffaa66);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .hero p {
            color: #bbaa88;
            margin-top: 0.5rem;
        }

        .tracks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .track-card {
            background: rgba(24, 24, 24, 0.85);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            overflow: hidden;
            transition: 0.25s;
            cursor: pointer;
            border: 1px solid rgba(255, 217, 102, 0.2);
        }

        .track-card:hover {
            transform: translateY(-6px);
            background: #202020;
            border-color: #ffd966;
            box-shadow: 0 20px 30px rgba(0,0,0,0.4);
        }

        .track-thumb {
            width: 100%;
            aspect-ratio: 1 / 1;
            background: linear-gradient(145deg, #2a3a28, #0f1a0c);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            position: relative;
            overflow: hidden;
        }

        .thumbnail-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .track-info {
            padding: 1rem;
        }

        .track-title {
            font-weight: 700;
            font-size: 0.95rem;
            margin-bottom: 0.2rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .track-artist {
            font-size: 0.75rem;
            color: #ffaa66;
        }

        .player {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(18, 18, 18, 0.98);
            backdrop-filter: blur(24px);
            border-top: 1px solid rgba(255, 217, 102, 0.5);
            padding: 0.8rem 1.8rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
            z-index: 200;
        }

        .player-info {
            display: flex;
            align-items: center;
            gap: 1rem;
            min-width: 220px;
        }

        .player-thumb {
            width: 56px;
            height: 56px;
            background: #2a3a28;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            overflow: hidden;
        }

        .player-thumb-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .player-meta {
            flex: 1;
        }

        .player-title {
            font-weight: 700;
            font-size: 0.95rem;
        }

        .player-artist {
            font-size: 0.7rem;
            color: #ffd966;
        }

        .player-controls {
            display: flex;
            gap: 1.2rem;
            align-items: center;
        }

        .player-btn {
            background: none;
            border: none;
            color: #ffd966;
            font-size: 2rem;
            cursor: pointer;
            transition: 0.1s;
        }

        .player-progress {
            flex: 3;
            min-width: 180px;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: #3a3a3a;
            border-radius: 4px;
            cursor: pointer;
        }

        .progress-fill {
            height: 100%;
            background: #ffd966;
            width: 0%;
            border-radius: 4px;
        }

        .time {
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            margin-top: 0.2rem;
            color: #aaa;
        }

        video {
            display: none;
        }

        @media (max-width: 700px) {
            .navbar { padding: 0.8rem 1rem; }
            .main-content { padding: 1rem; }
            .tracks-grid { gap: 1rem; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
            .player { flex-direction: column; align-items: stretch; padding: 0.8rem; }
            .player-progress { width: 100%; }
        }
    </style>
</head>
<body>
<div class="bg"></div>

<div class="navbar">
    <div class="logo">
        <div class="logo-icon">🎵⚡</div>
        <h1>ЦКК Music</h1>
    </div>
    <div class="stats" id="statsCounter">🎬 файлов: 0</div>
</div>

<div class="main-content">
    <div class="hero">
        <h2>🎶 Плейлист MP4</h2>
        <p>Треки подхватываются из папки с сайтом. Название и исполнитель берутся из имени файла (например, «Егор Летов - Всё идёт по плану.mp4»).</p>
    </div>
    <div class="tracks-grid" id="tracksGrid"></div>
</div>

<div class="player" id="player" style="display: none;">
    <div class="player-info">
        <div class="player-thumb" id="playerThumb">🎸</div>
        <div class="player-meta">
            <div class="player-title" id="playerTitle">—</div>
            <div class="player-artist" id="playerArtist">ЦКК Music</div>
        </div>
    </div>
    <div class="player-controls">
        <button class="player-btn" id="playPauseBtn">▶️</button>
        <button class="player-btn" id="stopBtn">⏹️</button>
    </div>
    <div class="player-progress">
        <div class="progress-bar" id="progressBar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="time">
            <span id="currentTime">0:00</span>
            <span id="duration">0:00</span>
        </div>
    </div>
</div>

<video id="videoPlayer" style="display: none;"></video>

<script>
    // ======================== ПЛЕЙЛИСТ ========================
    // 🔥 ЗДЕСЬ ТЫ ПРОПИСЫВАЕШЬ СВОИ MP4 ФАЙЛЫ 🔥
    // ПРОСТО ДОБАВЛЯЙ НОВЫЕ СТРОКИ ПО ТАКОМУ ЖЕ ПРИНЦИПУ
    const trackFiles = [
        "Егор Летов - Всё идёт по плану.mp4",
        "Егор Летов - Про дурачка.mp4",
        "Гражданская Оборона - Моя оборона.mp4",
        "Кино - Группа крови.mp4",
        "Егор Летов - Бери шинель.mp4",
        "Гражданская Оборона - Свобода.mp4"
    ];

    let tracks = [];
    let currentTrackIndex = 0;
    let isPlaying = false;
    const videoPlayer = document.getElementById('videoPlayer');
    const playPauseBtn = document.getElementById('playPauseBtn');
    const stopBtn = document.getElementById('stopBtn');
    const progressBar = document.getElementById('progressBar');
    const progressFill = document.getElementById('progressFill');
    const currentTimeSpan = document.getElementById('currentTime');
    const durationSpan = document.getElementById('duration');
    const playerDiv = document.getElementById('player');
    const playerTitle = document.getElementById('playerTitle');
    const playerArtist = document.getElementById('playerArtist');
    const playerThumbDiv = document.getElementById('playerThumb');
    const statsSpan = document.getElementById('statsCounter');
    const tracksGrid = document.getElementById('tracksGrid');

    function formatTime(seconds) {
        if (isNaN(seconds)) return '0:00';
        const mins = Math.floor(seconds / 60);
        const secs = Math.floor(seconds % 60);
        return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
    }

    function parseArtistAndTitle(filename) {
        let name = filename.replace(/\.mp4$/i, '');
        let artist = 'Неизвестный исполнитель';
        let title = name;
        if (name.includes(' - ')) {
            const parts = name.split(' - ');
            if (parts.length >= 2) {
                artist = parts[0].trim();
                title = parts.slice(1).join(' - ').trim();
            }
        } else if (name.includes('–')) {
            const parts = name.split('–');
            if (parts.length >= 2) {
                artist = parts[0].trim();
                title = parts.slice(1).join('–').trim();
            }
        }
        return { artist, title };
    }

    async function getVideoThumbnail(srcUrl, fileName) {
        return new Promise((resolve) => {
            const video = document.createElement('video');
            video.preload = 'metadata';
            video.muted = true;
            video.crossOrigin = 'Anonymous';
            video.src = srcUrl;
            video.addEventListener('loadeddata', () => {
                video.currentTime = 1;
            });
            video.addEventListener('seeked', () => {
                const canvas = document.createElement('canvas');
                canvas.width = 200;
                canvas.height = 200;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                const thumbnail = canvas.toDataURL();
                resolve(thumbnail);
            });
            video.addEventListener('error', () => {
                resolve(null);
            });
        });
    }

    async function loadTracks() {
        tracks = [];
        for (const fileName of trackFiles) {
            const { artist, title } = parseArtistAndTitle(fileName);
            const url = fileName;
            let thumbnail = null;
            try {
                thumbnail = await getVideoThumbnail(url, fileName);
            } catch(e) {}
            tracks.push({
                title: title,
                artist: artist,
                url: url,
                thumbnail: thumbnail,
                fileName: fileName
            });
        }
        renderTracks();
        if (tracks.length > 0) playTrack(0);
    }

    function renderTracks() {
        statsSpan.innerText = `🎬 файлов: ${tracks.length}`;
        tracksGrid.innerHTML = '';
        if (tracks.length === 0) {
            tracksGrid.innerHTML = '<div style="text-align:center; padding:2rem;">📭 Файлы не найдены. Проверьте, что MP4 лежат в той же папке, что и index.html, и их имена прописаны в коде.</div>';
            return;
        }
        tracks.forEach((track, idx) => {
            const card = document.createElement('div');
            card.className = 'track-card';
            card.innerHTML = `
                <div class="track-thumb">
                    ${track.thumbnail ? `<img class="thumbnail-img" src="${track.thumbnail}" alt="preview">` : '<span style="font-size:2.5rem;">🎬</span>'}
                </div>
                <div class="track-info">
                    <div class="track-title">${escapeHtml(track.title)}</div>
                    <div class="track-artist">${escapeHtml(track.artist)}</div>
                </div>
            `;
            card.addEventListener('click', () => playTrack(idx));
            tracksGrid.appendChild(card);
        });
    }

    function escapeHtml(str) { return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;')); }

    function updatePlayerUI() {
        const track = tracks[currentTrackIndex];
        if (!track) return;
        playerTitle.innerText = track.title;
        playerArtist.innerText = track.artist;
        if (track.thumbnail) {
            playerThumbDiv.innerHTML = `<img class="player-thumb-img" src="${track.thumbnail}" alt="cover">`;
        } else {
            playerThumbDiv.innerHTML = '🎬';
        }
    }

    function loadTrack(index) {
        const track = tracks[index];
        if (!track) return;
        videoPlayer.src = track.url;
        videoPlayer.load();
        updatePlayerUI();
        playerDiv.style.display = 'flex';
    }

    function playTrack(index) {
        if (currentTrackIndex === index && videoPlayer.src && !videoPlayer.paused) {
            videoPlayer.pause();
            isPlaying = false;
            playPauseBtn.innerText = '▶️';
        } else {
            currentTrackIndex = index;
            loadTrack(index);
            videoPlayer.play().then(() => {
                isPlaying = true;
                playPauseBtn.innerText = '⏸️';
            }).catch(() => {
                isPlaying = false;
                playPauseBtn.innerText = '▶️';
            });
        }
    }

    videoPlayer.addEventListener('loadedmetadata', () => {
        durationSpan.innerText = formatTime(videoPlayer.duration);
    });

    videoPlayer.addEventListener('timeupdate', () => {
        if (videoPlayer.duration) {
            const percent = (videoPlayer.currentTime / videoPlayer.duration) * 100;
            progressFill.style.width = `${percent}%`;
            currentTimeSpan.innerText = formatTime(videoPlayer.currentTime);
        }
    });

    videoPlayer.addEventListener('ended', () => {
        isPlaying = false;
        playPauseBtn.innerText = '▶️';
        const next = (currentTrackIndex + 1) % tracks.length;
        playTrack(next);
    });

    videoPlayer.addEventListener('play', () => {
        isPlaying = true;
        playPauseBtn.innerText = '⏸️';
    });
    videoPlayer.addEventListener('pause', () => {
        isPlaying = false;
        playPauseBtn.innerText = '▶️';
    });

    playPauseBtn.addEventListener('click', () => {
        if (!videoPlayer.src) return;
        if (videoPlayer.paused) videoPlayer.play();
        else videoPlayer.pause();
    });

    stopBtn.addEventListener('click', () => {
        videoPlayer.pause();
        videoPlayer.currentTime = 0;
        isPlaying = false;
        playPauseBtn.innerText = '▶️';
        progressFill.style.width = '0%';
        currentTimeSpan.innerText = '0:00';
    });

    progressBar.addEventListener('click', (e) => {
        if (!videoPlayer.duration) return;
        const rect = progressBar.getBoundingClientRect();
        const percent = (e.clientX - rect.left) / rect.width;
        videoPlayer.currentTime = percent * videoPlayer.duration;
    });

    loadTracks();
</script>
</body>
</html>
